<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category Create - chainapaikari</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
<style>
:root{
    --primary: #00c8ff;
    --accent: #00ff88;
    --text: #0a0f1e;
    --danger: #ef4444;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Hind Siliguri',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #e0f7ff 0%, #f0f9ff 100%);
    padding:20px;
    position:relative;
    overflow-x:hidden;
}

/* Background Blobs */
.blob{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:.3;
    animation:float 8s ease-in-out infinite;
    z-index:0;
}
.blob1{
    width:400px; height:400px;
    background:linear-gradient(135deg, #00c8ff, #00ff88);
    top:-100px; left:-100px;
}
.blob2{
    width:300px; height:300px;
    background:linear-gradient(135deg, #7c3aed, #00c8ff);
    bottom:-80px; right:-80px;
    animation-delay:2s;
}
@keyframes float{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(30px, -30px) scale(1.1);}
}

.card{
    position:relative;
    z-index:2;
    width:100%;
    max-width:520px;
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(25px) saturate(180%);
    -webkit-backdrop-filter:blur(25px) saturate(180%);
    padding:40px 35px;
    border-radius:25px;
    border:1px solid rgba(255,255,255,.6);
    box-shadow:0 20px 60px rgba(0,200,255,.15);
    animation:cardIn.8s cubic-bezier(.22,1,.36,1);
}
@keyframes cardIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}
h2{
    font-family:'Poppins',sans-serif;
    font-size:26px;
    color:var(--text);
}
.logout{
    color:var(--danger);
    cursor:pointer;
    font-weight:700;
    padding:8px 16px;
    border-radius:10px;
    background:rgba(239,68,68,.1);
    transition:.3s;
}
.logout:hover{background:rgba(239,68,68,.2);}

label{
    font-weight:600;
    margin-top:20px;
    display:block;
    color:#475569;
    font-size:14px;
}
input[type="text"]{
    width:100%;
    padding:14px 16px;
    margin-top:8px;
    border-radius:12px;
    border:2px solid #e2e8f0;
    background:#fff;
    color:var(--text);
    font-size:16px;
    transition:.3s;
}
input[type="text"]:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(0,200,255,.1);
}
#slug{
    background:rgba(0,255,136,.08);
    border-color:var(--accent);
    color:#059669;
    font-weight:700;
}

/* Premium File Upload */
.upload-box{
    border:2px dashed var(--primary);
    border-radius:15px;
    padding:30px 25px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
    background:linear-gradient(135deg, rgba(0,200,255,.05), rgba(0,255,136,.05));
    margin-top:8px;
}
.upload-box:hover{
    border-color:var(--accent);
    background:linear-gradient(135deg, rgba(0,200,255,.1), rgba(0,255,136,.1));
    transform:translateY(-2px);
}
.upload-box svg{
    width:55px;
    height:55px;
    fill:var(--primary);
    margin-bottom:12px;
}
.upload-box p{margin:5px 0;color:#64748b;}
.upload-box b{color:var(--primary);font-size:16px;}
#image{display:none;}

#preview{
    width:100%;
    max-height:220px;
    object-fit:cover;
    border-radius:15px;
    margin-top:15px;
    display:none;
    border:3px solid var(--accent);
    box-shadow:0 8px 20px rgba(0,255,136,.2);
}
#compressInfo{
    font-size:13px;
    color:#059669;
    margin-top:8px;
    text-align:center;
    font-weight:600;
    display:none;
}

button{
    width:100%;
    padding:15px;
    margin-top:25px;
    background:linear-gradient(90deg, var(--primary), var(--accent));
    color:#fff;
    font-weight:700;
    font-size:17px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 8px 20px rgba(0,200,255,.3);
}
button:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 30px rgba(0,200,255,.4);
}
button:active{transform:scale(.98);}

#status{
    margin-top:18px;
    text-align:center;
    font-weight:700;
    font-size:15px;
}
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">
<div class="top-bar">
    <h2>নতুন Category</h2>
    <span class="logout" id="logout">Logout</span>
</div>

<form id="categoryForm">
    <label>Category Image</label>
    <div class="upload-box" id="uploadBox">
        <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
        <p><b>ছবি আপলোড করুন</b></p>
        <p>ক্লিক করুন অথবা Drag & Drop করুন</p>
        <p style="font-size:12px;">Auto WebP Compress হবে</p>
    </div>
    <input type="file" id="image" accept="image/*" required>
    <img id="preview">
    <div id="compressInfo"></div>

    <label>Category Name</label>
    <input type="text" id="name" placeholder="যেমন: Smart Phone" required>

    <label>Category Slug / Username</label>
    <input type="text" id="slug" placeholder="smartphone" readonly>

    <button type="submit">Category Save করুন</button>
</form>
<div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5q-gEWhHbBB_kn0ZDNPYXC2urpSbpPd8",
  authDomain: "chaina-paikari.firebaseapp.com",
  projectId: "chaina-paikari",
  storageBucket: "chaina-paikari.firebasestorage.app",
  messagingSenderId: "968909884753",
  appId: "1:968909884753:web:88ab6754c2edda39bb1770"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const IMGBB_API_KEY = "78b96e02ef49049995a9f46a7d62fcd5";
let compressedFile = null;

// লগিন চেক
onAuthStateChanged(auth, user => {
  if(!user) window.location.href = "login.html";
})
document.getElementById('logout').onclick = () => signOut(auth);

// Slug
document.getElementById('name').oninput = e => {
  let slug = e.target.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  document.getElementById('slug').value = slug;
}

// Upload Box Click
document.getElementById('uploadBox').onclick = () => document.getElementById('image').click();

// Drag Drop
const uploadBox = document.getElementById('uploadBox');
uploadBox.ondragover = e => {e.preventDefault(); uploadBox.style.borderColor = '#00ff88';}
uploadBox.ondragleave = () => {uploadBox.style.borderColor = '#00c8ff';}
uploadBox.ondrop = e => {
    e.preventDefault();
    uploadBox.style.borderColor = '#00c8ff';
    document.getElementById('image').files = e.dataTransfer.files;
    document.getElementById('image').dispatchEvent(new Event('change'));
}

// Image Select + Compress to WebP
document.getElementById('image').onchange = async (e) => {
  const file = e.target.files[0];
  if(!file) return;

  document.getElementById('status').innerText = "ছবি Compress হচ্ছে... ⏳";

  compressedFile = await compressImage(file, 1280, 0.8);

  const preview = document.getElementById('preview');
  preview.src = URL.createObjectURL(compressedFile);
  preview.style.display = 'block';

  const compressInfo = document.getElementById('compressInfo');
  compressInfo.innerText = `✅ Compress: ${(file.size/1024).toFixed(1)}KB → ${(compressedFile.size/1024).toFixed(1)}KB`;
  compressInfo.style.display = 'block';
  document.getElementById('status').innerText = "";
}

function compressImage(file, maxWidth, quality){
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (event) => {
      const img = new Image();
      img.src = event.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;

        if(width > maxWidth){
          height *= maxWidth / width;
          width = maxWidth;
        }

        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        canvas.toBlob((blob) => {
            const webpName = file.name.replace(/\.[^/.]+$/, "") + ".webp";
            resolve(new File([blob], webpName, {type: "image/webp", lastModified: Date.now()}));
        }, "image/webp", quality);
      }
    }
  });
};

// imgbb upload
async function uploadToImgBB(file){
  const formData = new FormData();
  formData.append("image", file);
  const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {method: "POST", body: formData});
  const data = await res.json();

  // Error Check অ্যাড করলাম
  if(!res.ok || !data.success){
      throw new Error(`ছবি আপলোড হয়নি। imgbb: ${data.error?.message || 'Unknown Error'}`);
  }
  return data.data.url;
}

// Save to Firestore
document.getElementById('categoryForm').onsubmit = async (e) => {
  e.preventDefault();
  const status = document.getElementById('status');
  status.style.color = '#64748b';
  status.innerText = "Saving... ⏳";
  try {
    const fileToUpload = compressedFile || document.getElementById('image').files[0];
    const imageUrl = await uploadToImgBB(fileToUpload);

    await addDoc(collection(db, "categories"), {
      name: document.getElementById('name').value,
      slug: document.getElementById('slug').value,
      image: imageUrl,
      createdAt: serverTimestamp(),
      createdBy: auth.currentUser.email
    });

    status.style.color = '#059669';
    status.innerText = "✅ Category সফলভাবে সেভ হয়েছে!";
    e.target.reset();
    document.getElementById('preview').style.display = 'none';
    document.getElementById('compressInfo').style.display = 'none';
    compressedFile = null;
  } catch (err) {
    status.style.color = '#ef4444';
    status.innerText = "❌ Error: " + err.message;
  }
}
</script>
</body>
</html>
