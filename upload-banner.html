<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Upload - chainapaikari</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
<style>
:root{--primary:#00c8ff;--accent:#00ff88;--danger:#ef4444;--bg1:#0f172a;--bg2:#1e293b;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);padding:15px;color:#e2e8f0;}
.card{max-width:900px;margin:10px auto;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);padding:30px;border-radius:20px;border:1px solid rgba(255,255,255,.1);}
h2{text-align:center;font-family:'Poppins';margin-bottom:25px;font-size:24px;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.top-bar a{color:var(--primary);font-weight:700;text-decoration:none;font-size:14px;}

.upload-box{border:2px dashed var(--primary);border-radius:15px;padding:30px;text-align:center;cursor:pointer;background:rgba(0,200,255,.05);margin-bottom:20px;transition:.3s;}
.upload-box:hover{background:rgba(0,200,255,.1);}
.upload-box p{font-size:16px;color:#94a3b8;}
.preview-wrap{margin-top:20px;text-align:center;display:none;}
.preview-wrap img{max-width:100%;border-radius:12px;border:2px solid var(--accent);aspect-ratio:981/363;object-fit:cover;}
.preview-wrap p{margin-top:8px;color:#94a3b8;font-size:13px;}

#uploadBtn{background:linear-gradient(90deg,var(--primary),var(--accent));width:100%;padding:16px;margin-top:20px;color:#0f172a;font-weight:700;font-size:17px;border:none;border-radius:12px;cursor:pointer;transition:.3s;}
#uploadBtn:disabled{background:#334155;color:#fff;cursor:not-allowed;}

.banner-list{margin-top:35px;}
.banner-list h3{margin-bottom:15px;font-size:18px;}
.banner-item{position:relative;margin-bottom:15px;border-radius:12px;overflow:hidden;border:2px solid rgba(255,255,255,.1);}
.banner-item img{width:100%;display:block;aspect-ratio:981/363;object-fit:cover;}
.btn-delete{position:absolute;top:10px;right:10px;background:var(--danger);color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;}
#status{text-align:center;margin-top:15px;font-weight:600;font-size:14px;}
.empty-text{text-align:center;color:#94a3b8;padding:20px;}
</style>
</head>
<body>

<div class="card">
<div class="top-bar">
    <a href="dashboard.html">← Dashboard</a>
    <span id="logout" style="color:var(--danger);cursor:pointer;font-weight:700;">Logout</span>
</div>

<h2>Banner Upload করুন 981 x 363</h2>

<div class="upload-box" id="uploadBox">
    <p><b>+ এখানে ক্লিক করে Banner সিলেক্ট করুন</b><br><small>যেকোনো সাইজ দিলেও 981x363 তে কনভার্ট হবে</small></p>
    <input type="file" id="bannerFile" accept="image/*" style="display:none;">
</div>

<div class="preview-wrap" id="previewWrap">
    <img id="previewImg" src="">
    <p>Preview - 981 x 363</p>
</div>

<input type="text" id="title" placeholder="Banner Title" style="width:100%;padding:12px;margin-top:15px;border-radius:10px;border:none;outline:none;">

<input type="text" id="subtitle" placeholder="Banner Subtitle" style="width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;outline:none;">

<input type="text" id="link" placeholder="Banner Link (যেমন: products.html)" style="width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;outline:none;">

<button id="uploadBtn" disabled>Upload Banner</button>
<div id="status"></div>

<div class="banner-list">
    <h3>আগের Banners</h3>
    <div id="bannerList">লোড হচ্ছে...</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5q-gEWhHbBB_kn0ZDNPYXC2urpSbpPd8",
  authDomain: "chaina-paikari.firebaseapp.com",
  projectId: "chaina-paikari",
  storageBucket: "chaina-paikari.firebasestorage.app",
  messagingSenderId: "968909884753",
  appId: "1:968909884753:web:88ab6754c2edda39bb1770"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const IMGBB_API_KEY = "78b96e02ef49049995a9f46a7d62fcd5";

// Auth Guard
onAuthStateChanged(auth, user => {
    if(!user) window.location.href = "index.html";
})
document.getElementById('logout').onclick = () => signOut(auth);

let selectedFile = null;

document.addEventListener('DOMContentLoaded', () => {
    loadBanners();
    initEvents();
})

function initEvents(){
    document.getElementById('uploadBox').onclick = () => document.getElementById('bannerFile').click();
    document.getElementById('bannerFile').onchange = handleFileSelect;
    document.getElementById('uploadBtn').onclick = handleUpload;
}

async function handleFileSelect(e){
    const file = e.target.files[0];
    if(!file) return;

    document.getElementById('status').innerText = "Processing... ⏳";
    document.getElementById('uploadBtn').disabled = true;
    // 981x363 তে কনভার্ট করো
    selectedFile = await processImage(file, 981, 363, 0.8);

    document.getElementById('previewImg').src = URL.createObjectURL(selectedFile);
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('uploadBtn').disabled = false;
    document.getElementById('status').innerText = "";
}

// Canvas দিয়ে Resize + Crop + Webp - FIXED
function processImage(file, targetW, targetH, quality){
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (event) => {
      const img = new Image();
      img.src = event.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = targetW;
        canvas.height = targetH;
        const ctx = canvas.getContext('2d');

        // Center Crop
        let {width, height} = img;
        let sx = 0, sy = 0;
        let sWidth = width, sHeight = height;
        const imgRatio = width / height;
        const targetRatio = targetW / targetH;

        if(imgRatio > targetRatio){
            sWidth = height * targetRatio;
            sx = (width - sWidth) / 2;
        } else {
            sHeight = width / targetRatio;
            sy = (height - sHeight) / 2;
        }

        ctx.drawImage(img, sx, sy, sWidth, sHeight, 0, 0, targetW, targetH);

        canvas.toBlob((blob) => {
    resolve(
        new File(
            [blob],
            "banner.webp",
            {
                type: "image/webp",
                lastModified: Date.now()
            }
        )
    );
}, "image/webp", quality);
      }
    }
  });
}

async function handleUpload(){
  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.innerText = "Uploading... ⏳";

  try {
    const formData = new FormData();
    formData.append("image", selectedFile);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {method:"POST",body:formData});
    const imgData = await res.json();

    if(!imgData.success) throw new Error(imgData.error.message);

    await addDoc(collection(db, "banners"), {
    url: imgData.data.url,
    title: document.getElementById("title").value.trim(),
    subtitle: document.getElementById("subtitle").value.trim(),
    link: document.getElementById("link").value.trim() || "products.html",
    createdAt: serverTimestamp()
});

    document.getElementById('status').style.color = '#00ff88';
    document.getElementById('status').innerText = "✅ Banner Uploaded!";
    resetUpload();
    loadBanners();
  } catch(err){
    document.getElementById('status').style.color = 'var(--danger)';
    document.getElementById('status').innerText = "❌ Error: " + err.message;
  }
  btn.disabled = false;
  btn.innerText = "Upload Banner";
}

function resetUpload(){
    selectedFile = null;
    document.getElementById('bannerFile').value = '';
    document.getElementById('previewWrap').style.display = 'none';
    document.getElementById('uploadBtn').disabled = true;
}

async function loadBanners(){
    const listDiv = document.getElementById('bannerList');
    listDiv.innerHTML = "লোড হচ্ছে...";
    try {
        const q = query(collection(db, "banners"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);

        if(snapshot.empty){
            // FIX: "পাওয়া যায়নি" মেসেজ
            listDiv.innerHTML = "<p class='empty-text'>কোনো Banner পাওয়া যায়নি</p>";
            return;
        }

        listDiv.innerHTML = '';
        snapshot.docs.forEach(docSnap => {
            const data = docSnap.data();
            const item = `
                <div class="banner-item">
                    <img src="${data.url}" alt="banner" loading="lazy">
                    <button class="btn-delete" onclick="deleteBanner('${docSnap.id}')">Delete</button>
                </div>
            `;
            listDiv.innerHTML += item;
        });
    } catch(err){
        listDiv.innerHTML = `<p class='empty-text'>Error: ${err.message}</p>`;
    }
}

window.deleteBanner = async (id) => {
    if(!confirm("এই Banner টি ডিলিট করবেন?")) return;
    try {
        await deleteDoc(doc(db, "banners", id));
        loadBanners();
        alert("✅ Deleted!");
    } catch(err){
        alert("❌ Error: " + err.message);
    }
}
</script>
</body>
</html>
