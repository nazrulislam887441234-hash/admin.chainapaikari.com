<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>নতুন প্রোডাক্ট - chainapaikari</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
<style>
:root{--primary:#00c8ff;--accent:#00ff88;--danger:#ef4444;--bg1:#0f172a;--bg2:#1e293b;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);padding:20px;color:#e2e8f0;}
.card{max-width:800px;margin:20px auto;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);padding:35px;border-radius:25px;border:1px solid rgba(255,255,255,.1);box-shadow:0 20px 60px rgba(0,0,0,.3);}
h2{text-align:center;font-family:'Poppins';margin-bottom:30px;font-size:28px;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
label{font-weight:600;margin-top:18px;display:block;color:#94a3b8;font-size:14px;}
input,select,textarea{width:100%;padding:14px;margin-top:8px;border-radius:12px;border:2px solid rgba(255,255,255,.1);background:rgba(0,0,0,.2);color:#fff;font-size:16px;transition:.3s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);background:rgba(0,0,0,.3);}
textarea{min-height:120px;resize:vertical;}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
.upload-box{border:2px dashed var(--primary);border-radius:15px;padding:25px;text-align:center;cursor:pointer;background:rgba(0,200,255,.05);margin-top:10px;}
.upload-box:hover{background:rgba(0,200,255,.1);}
.upload-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;margin-top:15px;}
.img-wrap{position:relative;}
.preview-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px;border:2px solid var(--accent);}
.img-wrap .remove{
    position:absolute;
    top:-8px;
    right:-8px;
    background:#ef4444;
    color:#fff;
    border:none;
    border-radius:50%;
    width:26px;
    height:26px;
    cursor:pointer;
    font-weight:700;
    font-size:16px;
}
.keyword-box{display:flex;gap:10px;margin-top:8px;}
.btn-add{padding:14px 20px;background:var(--primary);color:#0f172a;border:none;border-radius:10px;font-weight:700;cursor:pointer;}
.keyword-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.keyword-tag{background:rgba(0,200,255,.15);padding:6px 12px;border-radius:20px;font-size:13px;display:flex;align-items:center;gap:5px;}
.keyword-tag span{cursor:pointer;color:var(--danger);font-weight:700;}
#uploadBtn{background:#334155;cursor:not-allowed;width:100%;padding:16px;margin-top:25px;color:#fff;font-weight:700;font-size:17px;border:none;border-radius:12px;transition:.3s;}
#uploadBtn.active{background:linear-gradient(90deg,var(--primary),var(--accent));cursor:pointer;color:#0f172a;}
.top-bar{display:flex;justify-content:space-between;margin-bottom:20px;}
.top-bar a{color:var(--primary);font-weight:700;text-decoration:none;}
#status{text-align:center;margin-top:15px;font-weight:600;}
</style>
</head>
<body>

<div class="card">
<div class="top-bar">
    <a href="dashboard.html">← Dashboard</a>
    <span id="logout" style="color:var(--danger);cursor:pointer;font-weight:700;">Logout</span>
</div>

<h2>নতুন Product যোগ করুন</h2>

<form id="productForm">

    <label>Category Select *</label>
    <select id="category" required>
        <option value="">Category লোড হচ্ছে...</option>
    </select>

    <div class="price-grid">
        <div>
            <label>আগের দাম *</label>
            <input type="number" id="oldPrice" placeholder="25000" required>
        </div>
        <div>
            <label>বর্তমান দাম *</label>
            <input type="number" id="currentPrice" placeholder="22000" required>
        </div>
    </div>

    <label>Description *</label>
    <textarea id="description" placeholder="Product এর বিস্তারিত লিখুন..." required></textarea>

    <label>Product Name *</label>
    <input type="text" id="name" placeholder="যেমন: iPhone 15 Pro Max" required>

    <label>Keywords</label>
    <div class="keyword-box">
        <input type="text" id="keywordInput" placeholder="keyword লিখে Add চাপুন">
        <button type="button" class="btn-add" id="addKeyword">Add</button>
    </div>
    <div class="keyword-list" id="keywordList"></div>

    <label>Product Images * <small style="color:#94a3b8;">আনলিমিটেড - Auto WebP + Compress</small></label>
    <div class="upload-box" id="uploadBox">
        <p><b>+ ছবি যোগ করুন</b></p>
        <p style="font-size:12px;color:#94a3b8;">একসাথে অনেকগুলো সিলেক্ট করতে পারবেন</p>
    </div>
    <input type="file" id="image" accept="image/*" multiple style="display:none;">
    <div class="upload-grid" id="previewGrid"></div>

    <button type="submit" id="uploadBtn">Upload Product</button>
</form>
<div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5q-gEWhHbBB_kn0ZDNPYXC2urpSbpPd8",
  authDomain: "chaina-paikari.firebaseapp.com",
  projectId: "chaina-paikari",
  storageBucket: "chaina-paikari.firebasestorage.app",
  messagingSenderId: "968909884753",
  appId: "1:968909884753:web:88ab6754c2edda39bb1770"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const IMGBB_API_KEY = "78b96e02ef49049995a9f46a7d62fcd5";

// 1. Auth Guard - লগিন ছাড়া ঢুকতে পারবে না
onAuthStateChanged(auth, user => {
    if(!user) window.location.href = "index.html";
})
document.getElementById('logout').onclick = () => signOut(auth);

let compressedFiles = []; // একাধিক ছবি
let keywords = [];

document.addEventListener('DOMContentLoaded', () => {
    loadCategories();
    initEvents();
})

function initEvents(){
    document.getElementById('uploadBox').onclick = () => document.getElementById('image').click();

    // Multiple Image Upload + Compress + WebP
    document.getElementById('image').onchange = async (e) => {
      const files = Array.from(e.target.files);
      if(!files.length) return;
      document.getElementById('status').innerText = `${files.length} টি ছবি Compress হচ্ছে...`;

      for(let file of files){
        const compressed = await compressImage(file, 1280, 0.75);
        compressedFiles.push(compressed);
        addPreview(compressed);
      }
      document.getElementById('status').innerText = `✅ ${compressedFiles.length} টি ছবি রেডি`;
      checkForm();
      e.target.value = ''; // আবার সিলেক্ট করতে পারবে
    }

    document.getElementById('addKeyword').onclick = addKeywordFunc;
    document.getElementById('keywordInput').onkeypress = (e) => {
        if(e.key === 'Enter'){ e.preventDefault(); addKeywordFunc(); }
    }

    ['name','description','oldPrice','currentPrice','category'].forEach(id=>{
        document.getElementById(id).oninput = checkForm;
    })
    document.getElementById('category').onchange = checkForm;
    document.getElementById('productForm').onsubmit = handleSubmit;
}

function addPreview(file){
    const wrap = document.createElement('div');
    wrap.className = 'img-wrap';
    wrap.innerHTML = `
        <img src="${URL.createObjectURL(file)}" class="preview-img">
        <button type="button" class="remove">×</button>
    `;
    wrap.querySelector('.remove').onclick = () => {
        const index = compressedFiles.indexOf(file);
        compressedFiles.splice(index,1);
        wrap.remove();
        document.getElementById('status').innerText = `✅ ${compressedFiles.length} টি ছবি রেডি`;
        checkForm();
    }
    document.getElementById('previewGrid').appendChild(wrap);
}

function addKeywordFunc(){
    const val = document.getElementById('keywordInput').value.trim();
    if(val &&!keywords.includes(val)){
        keywords.push(val);
        renderKeywords();
        document.getElementById('keywordInput').value = '';
    }
}

function renderKeywords(){
    document.getElementById('keywordList').innerHTML = keywords.map((k,i) =>
        `<div class="keyword-tag">${k} <span onclick="removeKeyword(${i})">×</span></div>`
    ).join('');
}
window.removeKeyword = (i) => { keywords.splice(i,1); renderKeywords(); }

async function loadCategories(){
    const select = document.getElementById('category');
    try {
        const snapshot = await getDocs(collection(db, "categories"));
        if(snapshot.empty){
            select.innerHTML = '<option value="">কোনো Category নেই</option>';
            return;
        }
        const cats = snapshot.docs.map(doc => ({id: doc.id,...doc.data()}));
        cats.sort((a,b) => a.name.localeCompare(b.name));
        select.innerHTML = '<option value="">Category Select করুন *</option>';
        cats.forEach(cat => {
            select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
        });
    } catch(err){
        select.innerHTML = `<option value="">Error: ${err.message}</option>`;
    }
}

// Image Compress + WebP Convert
function compressImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();

    reader.onload = (e) => {
      const img = new Image();

      img.onload = () => {
        const canvas = document.createElement("canvas");
        let width = img.width;
        let height = img.height;

        if (width > maxWidth) {
          height = height * (maxWidth / width);
          width = maxWidth;
        }

        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);

        canvas.toBlob((blob) => {
          resolve(
            new File(
              [blob],
              file.name.replace(/\.[^/.]+$/, "") + ".webp",
              {
                type: "image/webp",
                lastModified: Date.now()
              }
            )
          );
        }, "image/webp", quality);
      };

      img.src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}
function checkForm(){
    const name = document.getElementById('name').value;
    const desc = document.getElementById('description').value;
    const oldP = document.getElementById('oldPrice').value;
    const newP = document.getElementById('currentPrice').value;
    const cat = document.getElementById('category').value;
    const btn = document.getElementById('uploadBtn');
    if(compressedFiles.length > 0 && name && desc && oldP && newP && cat){
        btn.classList.add('active');
        btn.disabled = false;
    } else {
        btn.classList.remove('active');
        btn.disabled = true;
    }
}

async function handleSubmit(e){
  e.preventDefault();
  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.innerText = "Uploading... ⏳";
  document.getElementById('status').innerText = "";

  try {
    // সব ছবি imgbb তে আপলোড
    let imageUrls = [];
    for(let i=0; i<compressedFiles.length; i++){
        document.getElementById('status').innerText = `Uploading ${i+1}/${compressedFiles.length}...`;
        const formData = new FormData();
        formData.append("image", compressedFiles[i]);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {method:"POST",body:formData});
        const imgData = await res.json();

        // Error Check
        if(!res.ok ||!imgData.success){
            throw new Error(`ছবি ${i+1} আপলোড হয়নি। imgbb: ${imgData.error?.message || 'Unknown Error'}`);
        }
        imageUrls.push(imgData.data.url);
    }

    await addDoc(collection(db, "products"), {
      name: document.getElementById('name').value,
      description: document.getElementById('description').value,
      images: imageUrls, // array আকারে সেভ
      oldPrice: Number(document.getElementById('oldPrice').value),
      currentPrice: Number(document.getElementById('currentPrice').value),
      keywords: keywords,
      categoryId: document.getElementById('category').value,
      createdAt: serverTimestamp(),
      createdBy: auth.currentUser.email
    });

    document.getElementById('status').style.color = '#00ff88';
    document.getElementById('status').innerText = "✅ Product Uploaded!";
    setTimeout(() => window.location.href = "dashboard.html", 1500);
  } catch(err){
    document.getElementById('status').style.color = 'var(--danger)';
    document.getElementById('status').innerText = "❌ Error: " + err.message; // এখন সুন্দর Error দেখাবে
    btn.disabled = false;
    btn.innerText = "Upload Product";
  }
}
</script>
</body>
</html>
