<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Links - chainapaikari</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#00c8ff;--accent:#00ff88;--danger:#ef4444;--bg1:#0f172a;--bg2:#1e293b;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);padding:15px;color:#e2e8f0;}
.card{max-width:700px;margin:10px auto;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);padding:25px;border-radius:20px;border:1px solid rgba(255,255,255,.1);}
h2{text-align:center;font-family:'Poppins';margin-bottom:25px;font-size:24px;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
label{font-weight:600;margin-top:15px;display:block;color:#94a3b8;font-size:14px;}
input,select{width:100%;padding:14px;margin-top:8px;border-radius:12px;border:2px solid rgba(255,255,255,.1);background:rgba(0,0,0,.2);color:#fff;font-size:16px;}
input:focus,select:focus{outline:none;border-color:var(--primary);}
.input-group{display:flex;gap:10px;align-items:center;margin-top:8px;}
.input-group i{font-size:24px;width:30px;text-align:center;flex-shrink:0;}
#saveBtn{background:linear-gradient(90deg,var(--primary),var(--accent));width:100%;padding:16px;margin-top:20px;color:#0f172a;font-weight:700;font-size:17px;border:none;border-radius:12px;cursor:pointer;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:10px;}
.top-bar a{color:var(--primary);font-weight:700;text-decoration:none;font-size:14px;}
#logout{font-size:14px;}
#status{text-align:center;margin-top:15px;font-weight:600;font-size:14px;}
.link-list{margin-top:25px;}
.link-list h3{font-size:18px;}
.link-item{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.2);padding:12px;border-radius:12px;margin-bottom:10px;border:1px solid rgba(255,255,255,.1);gap:10px;flex-wrap:wrap;}
.link-item.info{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.link-item.info i{font-size:20px;flex-shrink:0;}
.link-item.info a{color:#e2e8f0;text-decoration:none;word-break:break-all;font-size:14px;}
.btn-delete{background:var(--danger);color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;flex-shrink:0;}

/* Mobile Responsive */
@media (max-width: 480px) {
    body{padding:10px;}
   .card{padding:20px;border-radius:15px;}
    h2{font-size:22px;margin-bottom:20px;}
    input,select{padding:12px;font-size:15px;}
    #saveBtn{padding:14px;font-size:16px;}
   .link-item{padding:10px;flex-direction:column;align-items:flex-start;}
   .link-item.info{width:100%;}
   .btn-delete{width:100%;margin-top:8px;}
}
</style>
</head>
<body>

<div class="card">
<div class="top-bar">
    <a href="dashboard.html">← Dashboard</a>
    <span id="logout" style="color:var(--danger);cursor:pointer;font-weight:700;">Logout</span>
</div>

<h2>Social Link Add করুন</h2>

<form id="linkForm">
    <label>Platform Select *</label>
    <select id="platform" required>
        <option value="">Platform সিলেক্ট করুন</option>
        <option value="youtube">Youtube</option>
        <option value="facebook">Facebook</option>
        <option value="instagram">Instagram</option>
        <option value="twitter">Twitter</option>
        <option value="tiktok">Tiktok</option>
    </select>

    <label>Link URL *</label>
    <div class="input-group">
        <i id="iconPreview" class="fa-solid fa-link"></i>
        <input type="url" id="linkUrl" placeholder="https://youtube.com/..." required>
    </div>

    <button type="submit" id="saveBtn">Save Link</button>
</form>

<div id="status"></div>

<div class="link-list">
    <h3 style="margin-bottom:15px;">আগের Links</h3>
    <div id="linkList">লোড হচ্ছে...</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5q-gEWhHbBB_kn0ZDNPYXC2urpSbpPd8",
  authDomain: "chaina-paikari.firebaseapp.com",
  projectId: "chaina-paikari",
  storageBucket: "chaina-paikari.firebasestorage.app",
  messagingSenderId: "968909884753",
  appId: "1:968909884753:web:88ab6754c2edda39bb1770"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Auth Guard
onAuthStateChanged(auth, user => {
    if(!user) window.location.href = "index.html";
})
document.getElementById('logout').onclick = () => signOut(auth);

// Platform Icon Map
const icons = {
    youtube: 'fa-brands fa-youtube',
    facebook: 'fa-brands fa-facebook',
    instagram: 'fa-brands fa-instagram',
    twitter: 'fa-brands fa-twitter',
    tiktok: 'fa-brands fa-tiktok'
}
const colors = {
    youtube: '#FF0000',
    facebook: '#1877F2',
    instagram: '#E4405F',
    twitter: '#1DA1F2',
    tiktok: '#00f2ea'
}

document.addEventListener('DOMContentLoaded', () => {
    loadLinks();
    initEvents();
})

function initEvents(){
    document.getElementById('platform').onchange = updateIcon;
    document.getElementById('linkForm').onsubmit = handleSave;
}

function updateIcon(){
    const platform = document.getElementById('platform').value;
    const iconEl = document.getElementById('iconPreview');
    if(platform){
        iconEl.className = icons[platform];
        iconEl.style.color = colors[platform];
    } else {
        iconEl.className = 'fa-solid fa-link';
        iconEl.style.color = '#94a3b8';
    }
}

async function handleSave(e){
  e.preventDefault();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerText = "Saving...";

  const platform = document.getElementById('platform').value;
  const url = document.getElementById('linkUrl').value;

  try {
    await addDoc(collection(db, "socialLinks"), {
      platform: platform,
      url: url,
      icon: icons[platform],
      color: colors[platform],
      createdAt: serverTimestamp()
    });

    document.getElementById('status').style.color = '#00ff88';
    document.getElementById('status').innerText = "✅ Link Saved!";
    document.getElementById('linkForm').reset();
    updateIcon();
    loadLinks();
    setTimeout(() => {document.getElementById('status').innerText = ""}, 2000);
  } catch(err){
    document.getElementById('status').style.color = 'var(--danger)';
    document.getElementById('status').innerText = "❌ Error: " + err.message;
  }
  btn.disabled = false;
  btn.innerText = "Save Link";
}

async function loadLinks(){
    const listDiv = document.getElementById('linkList');
    listDiv.innerHTML = "লোড হচ্ছে...";
    try {
        const q = query(collection(db, "socialLinks"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);

        if(snapshot.empty){
            listDiv.innerHTML = "<p style='color:#94a3b8;'>কোনো Link নেই</p>";
            return;
        }

        listDiv.innerHTML = '';
        snapshot.docs.forEach(docSnap => {
            const data = docSnap.data();
            const item = `
                <div class="link-item">
                    <div class="info">
                        <i class="${data.icon}" style="color:${data.color}"></i>
                        <a href="${data.url}" target="_blank">${data.url}</a>
                    </div>
                    <button class="btn-delete" onclick="deleteLink('${docSnap.id}')">Delete</button>
                </div>
            `;
            listDiv.innerHTML += item;
        });
    } catch(err){
        listDiv.innerHTML = "Error: " + err.message;
    }
}

window.deleteLink = async (id) => {
    if(!confirm("এই Link টি ডিলিট করবেন?")) return;
    try {
        await deleteDoc(doc(db, "socialLinks", id));
        loadLinks();
        alert("✅ Deleted!");
    } catch(err){
        alert("❌ Error: " + err.message);
    }
}
</script>
</body>
</html>
